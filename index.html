<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
<title>5-Day Workout Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #22c55e;
      --border: #374151;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #0f172a, #020617);
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 0 14px;
    }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .sub { color: var(--muted); font-size: .95rem; }
    .day-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin: 16px 0;
    }
    .day-tabs button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 6px;
      font-weight: 700;
      cursor: pointer;
    }
    .day-tabs button.active {
      background: var(--accent);
      color: #052e16;
      border-color: var(--accent);
    }
    .summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      background: var(--card);
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 14px;
    }
    .summary strong { display: block; font-size: 1.1rem; }
    .summary span { color: var(--muted); font-size: .85rem; }
    .exercise {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .exercise h3 { margin: 0 0 4px; font-size: 1.05rem; }
    .exercise .target { color: var(--muted); font-size: .9rem; margin-bottom: 12px; }
    .set-row {
      display: grid;
      grid-template-columns: 54px 1fr 1fr 48px;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 16px;
    }
    .check {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card2);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .check.done {
      background: var(--accent);
      color: #052e16;
      border-color: var(--accent);
    }
    .labels {
      display: grid;
      grid-template-columns: 54px 1fr 1fr 48px;
      gap: 8px;
      color: var(--muted);
      font-size: .75rem;
      margin-bottom: 5px;
      text-align: center;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .actions button {
      padding: 13px;
      border: 0;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .finish { background: var(--accent); color: #052e16; }
    .reset { background: #7f1d1d; color: white; }
    .history {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .history h2 { margin-top: 0; font-size: 1.2rem; }
    .history-item {
      border-top: 1px solid var(--border);
      padding: 10px 0;
      color: var(--muted);
      font-size: .9rem;
    }
    .history-item strong { color: var(--text); }
    .empty { color: var(--muted); }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: .8rem;
      margin-top: 20px;
    }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>
<div class="app">
  <header>
    <h1>Workout Tracker</h1>
    <div class="sub">5-day split • customizable sets & exercises</div>
    <div class="day-tabs" id="dayTabs"></div>
  </header>

  <div class="summary">
    <div><strong id="dayName">Monday</strong><span id="muscleName">Shoulders</span></div>
    <div style="text-align:right"><strong id="progressText">0/15</strong><span>sets complete</span></div>
  </div>

  <main id="workout"></main>

  <div class="actions">
    <button class="finish" onclick="finishWorkout()">Finish Workout</button>
    <button class="reset" onclick="resetDay()">Reset Day</button>
  </div>

  <section class="history">
    <h2>Workout History</h2>
    <div id="historyList"></div>
  </section>

  <footer>Your data is stored locally in this browser on your device.</footer>
</div>

<script>
const defaultSplit = {
  Monday: { muscle: "Shoulders", exercises: [
    "Seated Dumbbell Shoulder Press","Dumbbell Lateral Raises","Rear Delt Flyes","Cable Lateral Raises","Face Pulls"
  ]},
  Tuesday: { muscle: "Chest + Triceps", exercises: [
    "Seated Dumbbell Shoulder Press","Bench Press","Incline Dumbbell Press","Cable Flyes","Tricep Pushdowns","Overhead Tricep Extensions"
  ]},
  Wednesday: { muscle: "Back + Biceps", exercises: [
    "Seated Dumbbell Shoulder Press","Lat Pulldowns","Chest-Supported Rows","Seated Cable Rows","EZ-Bar Curls","Hammer Curls"
  ]},
  Thursday: { muscle: "Legs", exercises: [
    "Seated Dumbbell Shoulder Press","Squats or Leg Press","Romanian Deadlifts","Bulgarian Split Squats","Leg Curls","Leg Extensions","Calf Raises"
  ]},
  Friday: { muscle: "Shoulders", exercises: [
    "Seated Dumbbell Shoulder Press","Cable Lateral Raises","Reverse Pec Deck","Upright Cable Rows","Rear Delt Flyes"
  ]}
};

const exerciseLibrary = {
  "Shoulders": [
    "Seated Dumbbell Shoulder Press","Standing Dumbbell Shoulder Press","Barbell Overhead Press","Arnold Press",
    "Dumbbell Lateral Raises","Cable Lateral Raises","Machine Lateral Raise","Front Raises","Rear Delt Flyes",
    "Reverse Pec Deck","Face Pulls","Upright Cable Rows",
    "Band Shoulder Press","Band Lateral Raise","Band Front Raise","Band Pull-Apart","Band Face Pull"
  ],
  "Chest": [
    "Bench Press","Dumbbell Bench Press","Incline Dumbbell Press","Incline Bench Press","Chest Press Machine",
    "Push-Ups","Cable Flyes","Pec Deck","Dumbbell Flyes",
    "Band Chest Press","Band Chest Fly","Band Push-Up"
  ],
  "Back": [
    "Lat Pulldowns","Pull-Ups","Chest-Supported Rows","Barbell Rows","Seated Cable Rows","One-Arm Dumbbell Rows",
    "T-Bar Rows","Straight-Arm Pulldowns","Machine Rows",
    "Band Lat Pulldown","Band Seated Row","Band Bent-Over Row","Band Straight-Arm Pulldown"
  ],
  "Biceps": [
    "EZ-Bar Curls","Barbell Curls","Dumbbell Curls","Hammer Curls","Incline Dumbbell Curls","Preacher Curls",
    "Cable Curls","Concentration Curls","Band Bicep Curl","Band Hammer Curl"
  ],
  "Triceps": [
    "Tricep Pushdowns","Rope Pushdowns","Overhead Tricep Extensions","Skull Crushers","Close-Grip Bench Press",
    "Dips","Single-Arm Cable Extensions","Band Tricep Pushdown","Band Overhead Tricep Extension"
  ],
  "Legs": [
    "Squats","Leg Press","Squats or Leg Press","Romanian Deadlifts","Deadlifts","Bulgarian Split Squats",
    "Walking Lunges","Leg Curls","Leg Extensions","Hip Thrusts","Hack Squats","Goblet Squats","Calf Raises",
    "Seated Calf Raises","Band Squat","Band Romanian Deadlift","Band Good Morning","Band Lateral Walk",
    "Band Glute Bridge","Band Hip Thrust","Band Leg Curl","Band Leg Extension","Band Calf Raise"
  ],
  "Core": [
    "Cable Crunches","Hanging Leg Raises","Ab Wheel Rollouts","Planks","Decline Sit-Ups","Russian Twists",
    "Band Pallof Press","Band Wood Chop"
  ]
};

const days = Object.keys(defaultSplit);

function makeId(prefix){
  if (window.crypto && typeof window.crypto.randomUUID === "function") {
    return `${prefix}_${window.crypto.randomUUID()}`;
  }
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2)}`;
}
function makeSet(){ return { id: makeId("set") }; }
function makeExercise(name){
  return { id: makeId("ex"), name, sets: [makeSet(), makeSet(), makeSet()] };
}
function storageKey(day){ return "workout_" + day; }
function getDayData(day){ return JSON.parse(localStorage.getItem(storageKey(day)) || "{}"); }
function saveDayData(day,data){ localStorage.setItem(storageKey(day), JSON.stringify(data)); }

function normalizeSplit(rawSplit){
  const source = rawSplit || defaultSplit;
  const normalized = {};
  Object.entries(source).forEach(([day, info]) => {
    normalized[day] = {
      muscle: info.muscle,
      exercises: (info.exercises || []).map(ex => {
        if (typeof ex === "string") return makeExercise(ex);
        const copy = {...ex};
        copy.id = copy.id || makeId("ex");
        copy.name = copy.name || "Exercise";
        if (!Array.isArray(copy.sets) || !copy.sets.length) {
          copy.sets = [makeSet(), makeSet(), makeSet()];
        } else {
          copy.sets = copy.sets.map(s => ({id: (s && s.id) ? s.id : makeId("set")}));
        }
        return copy;
      })
    };
  });
  return normalized;
}

let split = normalizeSplit(JSON.parse(localStorage.getItem("custom_workout_split") || "null"));
function saveSplit(){ localStorage.setItem("custom_workout_split", JSON.stringify(split)); }

// Migrate v2/v3 data keyed as exerciseId_1, exerciseId_2, exerciseId_3
// into stable exerciseId_setId keys, without deleting the old entries.
function migrateStableSetIds(){
  days.forEach(day => {
    const data = getDayData(day);
    let changed = false;
    (split[day]?.exercises || []).forEach(exercise => {
      exercise.sets.forEach((setObj, index) => {
        const oldKey = `${exercise.id}_${index + 1}`;
        const newKey = `${exercise.id}_${setObj.id}`;
        if (data[oldKey] && !data[newKey]) {
          data[newKey] = data[oldKey];
          changed = true;
        }
      });
    });
    if (changed) saveDayData(day, data);
  });
}
saveSplit();
migrateStableSetIds();

const weekdayMap = {1:"Monday",2:"Tuesday",3:"Wednesday",4:"Thursday",5:"Friday"};
let currentDay = weekdayMap[new Date().getDay()] || "Monday";

function renderTabs(){
  const tabs = document.getElementById("dayTabs");
  tabs.innerHTML = "";
  days.forEach(day => {
    const b = document.createElement("button");
    b.textContent = day.slice(0,3);
    b.className = day === currentDay ? "active" : "";
    b.onclick = () => { currentDay = day; render(); };
    tabs.appendChild(b);
  });
}

function setKey(exercise, setObj){ return `${exercise.id}_${setObj.id}`; }

function exerciseOptionsHtml(selectedName=""){
  let opts = '<option value="">Choose an exercise...</option>';
  Object.entries(exerciseLibrary).forEach(([group, items]) => {
    opts += `<optgroup label="${group}">`;
    items.forEach(name => {
      const selected = name === selectedName ? " selected" : "";
      opts += `<option value="${name}"${selected}>${name}</option>`;
    });
    opts += `</optgroup>`;
  });
  return opts;
}

function renderWorkout(){
  const workout = document.getElementById("workout");
  const day = split[currentDay];
  const data = getDayData(currentDay);
  workout.innerHTML = "";

  document.getElementById("dayName").textContent = currentDay;
  document.getElementById("muscleName").textContent = day.muscle;

  // Day swapping control
  const swapCard = document.createElement("div");
  swapCard.className = "exercise";
  const otherDays = days.filter(d => d !== currentDay);
  swapCard.innerHTML = `
    <h3>Swap Workout Day</h3>
    <div class="target">Move this whole workout, including its saved set data, to another weekday.</div>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <select id="swapDaySelect" style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:16px">
        ${otherDays.map(d => `<option value="${d}">${d} — ${split[d].muscle}</option>`).join("")}
      </select>
      <button onclick="swapDays()" style="padding:0 14px;border:0;border-radius:10px;background:var(--accent);color:#052e16;font-weight:700">Swap</button>
    </div>`;
  workout.appendChild(swapCard);

  day.exercises.forEach((exercise, exIndex) => {
    const card = document.createElement("div");
    card.className = "exercise";
    card.draggable = true;
    card.dataset.exerciseId = exercise.id;
    card.style.touchAction = "auto";

    const header = document.createElement("div");
    header.style.cssText = "display:flex;justify-content:space-between;gap:8px;align-items:flex-start";
    header.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="drag-handle" style="font-size:18px;color:var(--muted);margin-bottom:5px;user-select:none;touch-action:none;cursor:grab">☰ Drag to reorder</div>
        <select class="exercise-name-select" aria-label="Change exercise" style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-size:16px;font-weight:700">
          ${exerciseOptionsHtml(exercise.name)}
        </select>
        <div class="target" style="margin-top:6px">${exercise.sets.length} set${exercise.sets.length===1?"":"s"} • target 10 reps each • drag to reorder</div>
      </div>
      <div class="exercise-controls" style="display:flex;gap:5px">
        <button class="remove-exercise" aria-label="Remove ${exercise.name}" style="width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#7f1d1d;color:white">✕</button>
      </div>`;
    card.appendChild(header);

    const nameSelect = header.querySelector(".exercise-name-select");
    const removeButton = header.querySelector(".remove-exercise");

    nameSelect.addEventListener("change", () => {
      if (!nameSelect.value || nameSelect.value === exercise.name) return;
      exercise.name = nameSelect.value;
      saveSplit();
      renderWorkout();
    });

    removeButton.addEventListener("click", (event) => {
      event.preventDefault();
      removeExercise(exIndex);
    });

    let pointerDragging = false;
    let pointerStartY = 0;

    const dragHandle = header.querySelector(".drag-handle");

    dragHandle.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      pointerDragging = true;
      pointerStartY = event.clientY;
      card.setPointerCapture(event.pointerId);
      card.style.opacity = "0.6";
      card.style.transform = "scale(0.995)";
      card.style.zIndex = "20";
      dragHandle.style.cursor = "grabbing";
    });

    card.addEventListener("pointermove", (event) => {
      if (!pointerDragging) return;
      event.preventDefault();

      const cards = [...document.querySelectorAll(".exercise[data-exercise-id]")];
      const hovered = cards.find(other => {
        if (other === card) return false;
        const rect = other.getBoundingClientRect();
        return event.clientY >= rect.top && event.clientY <= rect.bottom;
      });

      cards.forEach(el => el.style.outline = "");
      if (hovered) hovered.style.outline = "2px dashed var(--accent)";
    });

    function finishPointerDrag(event) {
      if (!pointerDragging) return;
      pointerDragging = false;

      try { card.releasePointerCapture(event.pointerId); } catch (_) {}
      card.style.opacity = "";
      card.style.transform = "";
      card.style.zIndex = "";
      dragHandle.style.cursor = "grab";

      const cards = [...document.querySelectorAll(".exercise[data-exercise-id]")];
      const hovered = cards.find(other => {
        if (other === card) return false;
        const rect = other.getBoundingClientRect();
        return event.clientY >= rect.top && event.clientY <= rect.bottom;
      });

      cards.forEach(el => el.style.outline = "");
      if (hovered) reorderExerciseById(exercise.id, hovered.dataset.exerciseId);
    }

    card.addEventListener("pointerup", finishPointerDrag);
    card.addEventListener("pointercancel", finishPointerDrag);

    const labels = document.createElement("div");
    labels.className = "labels";
    labels.innerHTML = "<div>Set</div><div>Weight</div><div>Reps</div><div>Done</div>";
    card.appendChild(labels);

    exercise.sets.forEach((setObj, setIndex) => {
      const key = setKey(exercise, setObj);
      const setData = data[key] || {weight:"", reps:"10", done:false};
      const row = document.createElement("div");
      row.className = "set-row";
      row.innerHTML = `
        <div style="text-align:center;font-weight:700">#${setIndex + 1}</div>
        <input inputmode="decimal" placeholder="lbs" value="${setData.weight ?? ""}" />
        <input inputmode="numeric" placeholder="10" value="${setData.reps ?? "10"}" />
        <button class="check ${setData.done ? "done" : ""}">${setData.done ? "✓" : ""}</button>`;
      const inputs = row.querySelectorAll("input");
      const doneButton = row.querySelector("button");
      inputs[0].oninput = () => updateSet(key, "weight", inputs[0].value);
      inputs[1].oninput = () => updateSet(key, "reps", inputs[1].value);
      doneButton.onclick = () => {
        const latest = getDayData(currentDay);
        const obj = latest[key] || {weight:inputs[0].value, reps:inputs[1].value, done:false};
        obj.done = !obj.done;
        latest[key] = obj;
        saveDayData(currentDay, latest);
        renderWorkout();
      };
      card.appendChild(row);
    });

    const setControls = document.createElement("div");
    setControls.style.cssText = "display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px";
    setControls.innerHTML = `
      <button onclick="addSet(${exIndex})" style="padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-weight:700">+ Add Set</button>
      <button onclick="removeLastSet(${exIndex})" ${exercise.sets.length<=1?'disabled':''} style="padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--card2);color:var(--text);font-weight:700">− Remove Set</button>`;
    card.appendChild(setControls);

    workout.appendChild(card);
  });

  const addCard = document.createElement("div");
  addCard.className = "exercise";
  const opts = exerciseOptionsHtml();
  addCard.innerHTML = `
    <h3>Add Exercise</h3>
    <div class="target">Exercises are grouped by muscle, including resistance bands.</div>
    <select id="exerciseSelect" style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:16px">${opts}</select>
    <button onclick="addExercise()" style="width:100%;margin-top:10px;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#052e16;font-weight:700;font-size:16px">+ Add Exercise</button>`;
  workout.appendChild(addCard);

  updateProgress();
}

function addExercise(){
  const sel = document.getElementById("exerciseSelect");
  if (!sel.value) return;
  split[currentDay].exercises.push(makeExercise(sel.value));
  saveSplit();
  renderWorkout();
}

function reorderExerciseById(draggedId, targetId){
  const exercises = split[currentDay].exercises;
  const fromIndex = exercises.findIndex(ex => ex.id === draggedId);
  const toIndex = exercises.findIndex(ex => ex.id === targetId);
  if (fromIndex < 0 || toIndex < 0 || fromIndex === toIndex) return;

  const [moved] = exercises.splice(fromIndex, 1);
  let insertIndex = toIndex;
  if (fromIndex < toIndex) insertIndex -= 1;
  exercises.splice(insertIndex, 0, moved);

  saveSplit();
  renderWorkout();
}
function moveExercise(index,dir){
  const a = split[currentDay].exercises;
  const n = index + dir;
  if (n < 0 || n >= a.length) return;
  [a[index],a[n]] = [a[n],a[index]];
  saveSplit();
  renderWorkout();
}
function removeExercise(index){
  const exercises = split[currentDay].exercises;
  const exercise = exercises[index];
  if (!exercise) return;

  const shouldRemove = window.confirm(`Remove ${exercise.name} from ${currentDay}?`);
  if (!shouldRemove) return;

  exercises.splice(index, 1);
  saveSplit();
  renderWorkout();
}
function addSet(exIndex){
  split[currentDay].exercises[exIndex].sets.push(makeSet());
  saveSplit();
  renderWorkout();
}
function removeLastSet(exIndex){
  const exercise = split[currentDay].exercises[exIndex];
  if (exercise.sets.length <= 1) return;
  const removed = exercise.sets[exercise.sets.length - 1];
  const data = getDayData(currentDay);
  const key = setKey(exercise, removed);
  if (data[key] && (data[key].weight || data[key].done || data[key].reps !== "10")) {
    if (!confirm("The last set has logged data. Remove that set anyway?")) return;
  }
  exercise.sets.pop();
  saveSplit();
  renderWorkout();
}

function swapDays(){
  const target = document.getElementById("swapDaySelect").value;
  if (!target || target === currentDay) return;
  const source = currentDay;

  // Swap the full workout definitions.
  [split[source], split[target]] = [split[target], split[source]];
  saveSplit();

  // Swap the saved workout-entry data so it follows the workout.
  const sourceData = localStorage.getItem(storageKey(source));
  const targetData = localStorage.getItem(storageKey(target));
  if (targetData === null) localStorage.removeItem(storageKey(source));
  else localStorage.setItem(storageKey(source), targetData);
  if (sourceData === null) localStorage.removeItem(storageKey(target));
  else localStorage.setItem(storageKey(target), sourceData);

  render();
}

function updateSet(key,field,value){
  const data = getDayData(currentDay);
  data[key] = data[key] || {weight:"",reps:"10",done:false};
  data[key][field] = value;
  saveDayData(currentDay,data);
}

function updateProgress(){
  const data = getDayData(currentDay);
  let total = 0, complete = 0;
  split[currentDay].exercises.forEach(exercise => {
    exercise.sets.forEach(setObj => {
      total++;
      if (data[setKey(exercise,setObj)]?.done) complete++;
    });
  });
  document.getElementById("progressText").textContent = `${complete}/${total}`;
}

function finishWorkout(){
  const data = getDayData(currentDay);
  let total = 0, complete = 0;
  split[currentDay].exercises.forEach(exercise => {
    exercise.sets.forEach(setObj => {
      total++;
      if (data[setKey(exercise,setObj)]?.done) complete++;
    });
  });
  const history = JSON.parse(localStorage.getItem("workout_history") || "[]");
  history.unshift({
    day: currentDay,
    muscle: split[currentDay].muscle,
    date: new Date().toLocaleDateString(),
    completed: complete,
    total
  });
  localStorage.setItem("workout_history", JSON.stringify(history.slice(0,30)));
  renderHistory();
  alert(`Workout saved: ${complete}/${total} sets completed.`);
}

function resetDay(){
  if (confirm(`Reset all entered weights, reps, and checkmarks for ${currentDay}?`)) {
    localStorage.removeItem(storageKey(currentDay));
    renderWorkout();
  }
}

function renderHistory(){
  const history = JSON.parse(localStorage.getItem("workout_history") || "[]");
  const list = document.getElementById("historyList");
  if (!history.length) {
    list.innerHTML = '<div class="empty">No completed workouts yet.</div>';
    return;
  }
  list.innerHTML = history.map(item => `
    <div class="history-item">
      <strong>${item.date} — ${item.day}</strong><br>
      ${item.muscle}: ${item.completed}/${item.total} sets completed
    </div>`).join("");
}

function render(){
  renderTabs();
  renderWorkout();
  renderHistory();
}
render();
</script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(console.error);
  });
}
</script>
